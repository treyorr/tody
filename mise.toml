[tools]
rust = { version = "1.93.1", profile = "default", components = "clippy,rustfmt" }

[env]
RUST_BACKTRACE = "1"
CARGO_TERM_COLOR = "always"

[tasks.fmt]
description = "Format Rust sources"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Verify formatting"
run = "cargo fmt --all -- --check"

[tasks.check]
description = "Type-check all targets"
run = "cargo check --all-targets"

[tasks.lint]
description = "Run clippy with warnings denied"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run unit tests"
run = "cargo test --all-targets"

[tasks.ci]
description = "Local CI pipeline"
depends = ["fmt-check", "check", "lint", "test"]

[tasks.clean]
description = "Remove target artifacts"
run = "cargo clean"
